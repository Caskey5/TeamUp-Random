        }

            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.08;
            z-index: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffd700' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: slide 20s linear infinite;
        }

        @keyframes slide {
            0% { transform: translateY(0); }
            100% { transform: translateY(60px); }
        }

        .floating-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .sport-icon {
            position: absolute;
            font-size: 40px;
            opacity: 0.1;
            animation: float 15s infinite ease-in-out;
        }

        .sport-icon:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .sport-icon:nth-child(2) { right: 15%; top: 30%; animation-delay: 2s; }
        .sport-icon:nth-child(3) { left: 20%; bottom: 25%; animation-delay: 4s; }
        .sport-icon:nth-child(4) { right: 10%; bottom: 20%; animation-delay: 6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        .auth-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 215, 0, 0.3);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .logo-tagline {
            color: #718096;
            font-size: 0.95rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            border: none;
            border-radius: 2px;
            margin: 20px auto 30px;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            color: #2d3748;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.15);
        }

        .form-input::placeholder {
            color: #cbd5e0;
        }

        .password-toggle {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #718096;
            transition: color 0.3s ease;
        }

        .toggle-btn:hover {
            color: #ffd700;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ffd700;
        }

        .checkbox-label {
            color: #4a5568;
            font-size: 0.9rem;
        }

        .checkbox-label a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a1a1a;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .divider-text {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #718096;
            font-size: 0.9rem;
        }

        .divider-text::before,
        .divider-text::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e2e8f0;
        }

        .divider-text::before {
            left: 0;
        }

        .divider-text::after {
            right: 0;
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.3rem;
        }

        .social-btn:hover {
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #718096;
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #718096;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ffd700;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 35px 25px;
                border-radius: 20px;
            }

            .logo-text {
                font-size: 1.7rem;
            }

            .logo-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    
    <div class="floating-icons">
        <div class="sport-icon">⚽</div>
        <div class="sport-icon">🏀</div>
        <div class="sport-icon">🎾</div>
        <div class="sport-icon">🏐</div>
    </div>

    <div class="auth-container">
        <a href="#" class="back-link">← Back to Home</a>
        
        <div class="logo">
            <div class="logo-icon">⚽</div>
            <h1 class="logo-text">TeamUp!</h1>
            <p class="logo-tagline">Create your account</p>
        </div>
        
        <hr class="divider">

        <!-- Error/Success messages -->
        <!-- <div class="error-message">Email already exists!</div> -->
        <!-- <div class="success-message">Account created successfully!</div> -->

        <form method="post">
            <!-- CSRF token here -->
            
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" name="full_name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" name="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-toggle">
                    <input type="password" class="form-input" name="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword('password')">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="password-toggle">
                    <input type="password" class="form-input" name="confirm_password" id="confirm_password" placeholder="••••••••" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword('confirm_password')">👁️</button>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" class="checkbox-input" id="terms" required>
                <label class="checkbox-label" for="terms">
                    I agree to the <a href="#">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <div class="divider-text">or sign up with</div>

        <div class="social-login">
            <button class="social-btn" title="Google">🔍</button>
            <button class="social-btn" title="Facebook">📘</button>
            <button class="social-btn" title="Apple">🍎</button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="#">Log In</a>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const button = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                button.textContent = '🙈';
            } else {
                field.type = 'password';
                button.textContent = '👁️';
            }
        }
    </script>
</body>
</html>

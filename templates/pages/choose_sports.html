{% load static %}

<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Team Generator</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
    
    
    {% block head_css %}
        <link rel="stylesheet" href="{% static 'css/pages/choose_sports.css' %}" />
    {% endblock head_css %}

    
</head>
<body>
    <div class="background-pattern"></div>

    <div class="floating-icons">
        <div class="sport-icon-float">⚽</div>
        <div class="sport-icon-float">🏀</div>
        <div class="sport-icon-float">🎾</div>
        <div class="sport-icon-float">🏐</div>
        <div class="sport-icon-float">🤾</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h2>Odaberi svoj sport</h2>
                <hr class="divider" />
                <p class="subtitle">Izaberi sport za koji želiš generirati tim i kreni u akciju!</p>
            </div>

            <div class="sports-grid">
                <a href="{% url 'pages:football_formats' %}" class="sport-btn">
                    <span class="sport-icon">⚽</span>
                    <span class="sport-name">Nogomet</span>
                </a>

                <a href="{% url 'pages:basketball_formats' %}" class="sport-btn">
                    <span class="sport-icon">🏀</span>
                    <span class="sport-name">Košarka</span>
                </a>

                <a href="{% url 'pages:tennis_formats' %}" class="sport-btn">
                    <span class="sport-icon">🎾</span>
                    <span class="sport-name">Tenis</span>
                </a>

                <a href="{% url 'pages:volleyball_formats' %}" class="sport-btn">
                    <span class="sport-icon">🏐</span>
                    <span class="sport-name">Odbojka</span>
                </a>

                <a href="{% url 'pages:handball_formats' %}" class="sport-btn">
                    <span class="sport-icon">🤾</span>
                    <span class="sport-name">Rukomet</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>

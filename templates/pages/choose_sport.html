{% load static %}

<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Team Generator</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
    
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/pages/choose_sports.css' %}">
</head>
<body>
    <div class="background-pattern"></div>
    
    <div class="floating-icons">
        <div class="sport-icon">⚽</div>
        <div class="sport-icon">🏀</div>
        <div class="sport-icon">🎾</div>
        <div class="sport-icon">🏐</div>
        <div class="sport-icon">⚾</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h2>Odaberi svoj sport</h2>
                <hr class="divider" />
                <p class="subtitle">Izaberi sport za koji želiš generirati tim i kreni u akciju!</p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">Sport</label>
                    <select class="form-control" name="sport" required>
                        <option value="">-- Odaberi sport --</option>
                        <option value="football">⚽ Nogomet</option>
                        <option value="basketball">🏀 Košarka</option>
                        <option value="tennis">🎾 Tenis</option>
                        <option value="volleyball">🏐 Odbojka</option>
                        <option value="handball">🤾 Rukomet</option>
                        <option value="baseball">⚾ Baseball</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">
                    Generiraj Tim
                </button>
            </form>
        </div>
    </div>
</body>
</html>
